<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Premium | Advanced 3D Interactive Showroom</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            color: #e2e8f0;
            line-height: 1.6;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f0728 100%);
            padding-bottom: 60px;
            overflow-x: hidden;
            perspective: 1000px;
        }
        a { text-decoration: none; color: inherit; }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(229, 62, 98, 0.6);
        }
        .logo span { color: #e53e3e; }

        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1517838277536-f5f99be501cd?q=80&w=1200') no-repeat center center/cover;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 20px;
            transform-style: preserve-3d;
            transform: translateZ(-50px);
        }
        .hero-content { 
            max-width: 800px;
            transform: translateZ(50px); 
        }
        .hero-content h1 { font-size: 56px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 24px; margin-bottom: 30px; color: #cbd5e1; }
        .badge { background-color: #e53e3e; color: white; padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 15px; text-transform: uppercase; box-shadow: 0 0 15px rgba(229, 62, 62, 0.5); }
        
        .btn {
            background: linear-gradient(135deg, #e53e3e 0%, #991b1b 100%); color: #fff; padding: 14px 35px; border-radius: 6px; font-weight: 700; transition: all 0.3s; border: none; cursor: pointer; text-transform: uppercase; display: inline-block;
            box-shadow: 0 4px 15px rgba(229, 62, 62, 0.4);
        }
        .btn:hover { transform: translateY(-3px) translateZ(10px); box-shadow: 0 8px 25px rgba(229, 62, 62, 0.6); }

        .order-btn {
            background: linear-gradient(135deg, #25d366 0%, #166534 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            width: 90%;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        .order-btn:hover { background-color: #1ebd58; transform: scale(1.03); }

        section { padding: 70px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 36px; margin-bottom: 50px; color: #fff; text-transform: uppercase; font-weight: 800; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .section-title::after { content: ''; display: block; width: 80px; height: 4px; background: #e53e3e; margin: 10px auto 0; border-radius: 2px; box-shadow: 0 0 10px #e53e3e; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
            transform-style: preserve-3d;
        }

        .product-card-container {
            perspective: 1200px;
            height: 520px;
        }

        .product-card { 
            background: rgba(30, 27, 75, 0.4); 
            border-radius: 16px; 
            height: 100%;
            width: 100%;
            position: relative;
            transform-style: preserve-3d; 
            transition: transform 0.3s ease, box-shadow 0.3s; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; 
            padding-bottom: 20px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .product-card:hover { 
            box-shadow: 0 20px 40px rgba(229, 62, 98, 0.25);
            border-color: rgba(229, 62, 98, 0.4);
        }
        
        .product-img { 
            height: 250px; 
            background-color: #0f172a; 
            background-size: cover; 
            background-position: center; 
            position: relative; 
            cursor: zoom-in; 
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transform: translateZ(20px);
            overflow: hidden;
        }
        .product-media-file { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        /* 360 Rotation Overlay Styles */
        .btn-360-trigger {
            position: absolute; bottom: 10px; right: 10px; background: rgba(229, 62, 62, 0.9); color: white; border: none; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: none; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .btn-360-trigger:hover { background: #e53e3e; transform: scale(1.05); }

        .product-info { 
            padding: 20px; 
            transform: translateZ(30px);
        }
        .product-info h3 { margin-bottom: 8px; color: #fff; font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); text-transform: capitalize; }
        .product-info p { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }

        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; border-radius: 50px; box-shadow: 0 0 20px rgba(37,211,102,0.5); z-index: 999; display: flex; justify-content: center; align-items: center; transition: all 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1) rotate(15deg); }

        .color-gallery-box {
            padding: 10px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 12px;
            border-radius: 8px;
        }
        .gallery-preview-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0;
            justify-content: center;
            min-height: 55px;
        }
        .mini-gallery-img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }
        .mini-gallery-img:hover { transform: scale(1.15) translateZ(10px); border-color: #e53e3e; }
        .mini-card-wrapper { position: relative; display: inline-block; }
        
        .del-mini-btn {
            position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; line-height: 14px; text-align: center;
            display: none; z-index: 10;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 3, 19, 0.95);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .image-modal img, .image-modal video {
            max-width: 90%;
            max-height: 85%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
        }
        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-trigger-container { text-align: center; margin-top: 40px; background: rgba(255,255,255,0.03); padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .admin-link { font-size: 13px; color: #94a3b8; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .admin-link:hover { color: #fff; }
        
        #secure-admin-panel { max-width: 600px; margin: 30px auto; background: #1e1b4b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); display: none; }
        .admin-auth-box input { padding: 12px; border: 1px solid rgba(255,255,255,0.2); background: #0f0728; color: white; border-radius: 6px; margin-right: 10px; }
        .admin-control-group { margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.2); display: none; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #cbd5e1; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background-color: #0f0728; color: white; }
        
        .cat-manager-box {
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        footer { background: #090416; color: #64748b; text-align: center; padding: 40px 20px; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
        footer strong { color: #fff; }
    </style>
</head>
<body>

    <!-- Zoomable Full Screen Modal -->
    <div id="imageModal" class="image-modal" onclick="closeFullPreview()">
        <span class="close-modal">&times;</span>
        <div id="modalContent"></div>
    </div>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/919339874507?text=Hello%20Prince%20Premium!" class="whatsapp-float" target="_blank">
        <svg width="35" height="35" fill="white" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>

    <header>
        <div class="nav-container">
            <div class="logo">Prince<span>Premium</span></div>
        </div>
    </header>

    <div class="hero" id="home">
        <div class="hero-content">
            <div class="badge">Wholesale & Retail 3D Space</div>
            <h1>Prince Premium</h1>
            <p>Premium Sports Wear & Apparel Showroom</p>
        </div>
    </div>

    <!-- DYNAMIC PRODUCTS SECTION -->
    <section id="products">
        <h2 class="section-title">Our Collections</h2>
        <div class="product-grid" id="main-product-grid">
            <!-- Dynamic Category Cards will inject here -->
        </div>
    </section>

    <!-- Admin Panel Control -->
    <div class="admin-trigger-container"><span class="admin-link" onclick="toggleAdminPanel()">👑 Admin Dashboard</span></div>
    
    <div id="secure-admin-panel">
        <div class="admin-auth-box" id="auth-box">
            <h3 style="margin-bottom:15px;">Admin Security Access</h3>
            <input type="password" id="admin-pin" placeholder="Enter Secure PIN">
            <button class="btn" style="padding: 10px 20px;" onclick="verifyAdminPIN()">Verify</button>
        </div>
        
        <div class="admin-control-group" id="admin-controls">
            <!-- Part A: Add New Category -->
            <div class="cat-manager-box">
                <h4 style="color:#e53e3e; margin-bottom:8px;">➕ Add New Category</h4>
                <div class="form-group">
                    <input type="text" id="new-cat-name" placeholder="Enter Category Name (e.g. Hoodies, Sarees)">
                </div>
                <button type="button" class="btn" onclick="addNewCategoryDynamic()" style="padding:8px 15px; font-size:12px; background:#10b981;">Create Category</button>
            </div>

            <!-- Part B: Upload Media items -->
            <h3 style="color:#2b6cb0; margin-bottom:15px; border-top:1px solid #334155; padding-top:10px;">Upload Stock Photo / Video</h3>
            
            <div class="form-group">
                <label>Select Category:</label>
                <select id="upload-category">
                    <!-- Dynamic Options Filled by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Select File (Photo or Video)</label>
                <input type="file" id="upload-photo" accept="image/*,video/*">
            </div>

            <button type="button" class="btn" onclick="uploadVarietyMedia()" style="width: 100%; background-color: #2b6cb0; margin-top: 10px; margin-bottom: 15px;">
                💾 Save Media to Live Gallery
            </button>
            
            <button type="button" class="btn" onclick="logoutAdmin()" style="width: 100%; background-color: #4a5568; margin-top: 5px;">
                🔒 Logout Admin
            </button>
            
            <div id="upload-status" style="font-weight:bold; color:#38bdf8; text-align: center; margin-top:10px;"></div>
        </div>
    </div>

    <footer><p>&copy; 2026 <strong>Prince Premium</strong>. All Rights Reserved.</p></footer>

    <script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    let db = null, storage = null;
    let isAdminActive = false;

    // Default Categories list to track locally if Firebase is absent
    let dynamicCategories = ['petticoats', 'tshirts', 'trousers', 'jackets', 'winchester'];
    let localMediaStock = {};

    // Tracking state for 360 interactivity
    let rotationStates = {};

    if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            storage = firebase.storage();
        } catch(e) { console.log("Firebase bypass setup."); }
    }

    window.onload = function() {
        if(db) {
            db.ref('categories').on('value', (snap) => {
                let data = snap.val();
                if(data) {
                    dynamicCategories = Object.values(data);
                }
                buildStructureAndLoadStock();
            });
        } else {
            dynamicCategories.forEach(c => localMediaStock[c] = {});
            buildStructureAndLoadStock();
        }
    };

    function buildStructureAndLoadStock() {
        const grid = document.getElementById("main-product-grid");
        const selectDrop = document.getElementById("upload-category");
        
        grid.innerHTML = "";
        selectDrop.innerHTML = "";

        dynamicCategories.forEach((cat) => {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat.toUpperCase();
            selectDrop.appendChild(opt);

            let cleanedId = cat.replace(/\s+/g, '-').toLowerCase();
            let cardWrapper = document.createElement('div');
            cardWrapper.className = 'product-card-container';
            cardWrapper.innerHTML = `
                <div class="product-card" id="card-${cleanedId}">
                    <div class="product-img" id="img-container-${cleanedId}" onclick="openMediaZoom('${cleanedId}')">
                        <div id="media-viewport-${cleanedId}" style="width:100%; height:100%;">
                           <div style="padding-top:100px; text-align:center; color:#64748b;">No Design Added</div>
                        </div>
                        <button class="btn-360-trigger" id="btn-360-${cleanedId}" onclick="event.stopPropagation(); toggle360Rotation('${cleanedId}')">🔄 360° Rotate</button>
                    </div>
                    <div class="product-info">
                        <h3>${cat}</h3>
                        <p>Premium factory design array collection.</p>
                        <div class="color-gallery-box">
                            <span style="font-size: 11px; font-weight: bold; color: #94a3b8;">Available Designs:</span>
                            <div class="gallery-preview-container" id="gallery-${cleanedId}"></div>
                        </div>
                        <button class="order-btn" onclick="event.stopPropagation(); redirectToWhatsApp('${cat}')">🛒 Book Order on WhatsApp</button>
                    </div>
                </div>
            `;
            grid.appendChild(cardWrapper);

            if(db) {
                db.ref('factory_stock/' + cleanedId).on('value', (snapshot) => {
                    renderGallery(cleanedId, snapshot.val());
                });
            } else {
                renderGallery(cleanedId, localMediaStock[cat]);
            }
        });

        setup3DTiltEffect();
    }

    function setup3DTiltEffect() {
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                // Only apply 3D tilt if this card is NOT currently being rotated in 360 mode
                let cleanedId = card.id.replace('card-', '');
                if (rotationStates[cleanedId] && rotationStates[cleanedId].active) return;

                let rect = card.getBoundingClientRect();
                let x = e.clientX - rect.left - (rect.width/2);
                let y = e.clientY - rect.top - (rect.height/2);
                card.style.transform = `rotateY(${x / 12}deg) rotateX(${-y / 12}deg) translateZ(10px)`;
            });
            card.addEventListener('mouseleave', () => {
                let cleanedId = card.id.replace('card-', '');
                if (rotationStates[cleanedId] && rotationStates[cleanedId].active) return;
                card.style.transform = `rotateY(0deg) rotateX(0deg) translateZ(0px)`;
            });
        });
    }

    function addNewCategoryDynamic() {
        let nameInput = document.getElementById("new-cat-name").value.trim().toLowerCase();
        if(!nameInput) { alert("Category ka naam likhein!"); return; }
        
        if(dynamicCategories.includes(nameInput)) {
            alert("Ye category pehle se bani hui hai!"); return;
        }

        if(db) {
            db.ref('categories').push(nameInput).then(() => {
                document.getElementById("new-cat-name").value = "";
                alert("New Category Dynamic Live Ho Gayi!");
            });
        } else {
            dynamicCategories.push(nameInput);
            localMediaStock[nameInput] = {};
            buildStructureAndLoadStock();
            document.getElementById("new-cat-name").value = "";
            alert("Local Preview Category Created!");
        }
    }

    function renderGallery(cleanedId, data) {
        const container = document.getElementById("gallery-" + cleanedId);
        const viewport = document.getElementById("media-viewport-" + cleanedId);
        const btn360 = document.getElementById("btn-360-" + cleanedId);
        if(!container) return;

        container.innerHTML = "";
        
        // Reset 360 state for this card on gallery load
        if(rotationStates[cleanedId]) {
            rotationStates[cleanedId].active = false;
        }
        
        if(data && Object.keys(data).length > 0) {
            let firstKey = Object.keys(data)[0];
            let firstItem = data[firstKey];
            
            setMainDisplay(viewport, firstItem.url, firstItem.type, btn360, cleanedId);

            Object.keys(data).forEach(key => {
                const item = data[key];
                const divWrapper = document.createElement('div');
                divWrapper.className = 'mini-card-wrapper';
                
                let displayState = isAdminActive ? 'block' : 'none';
                let previewThumb = item.type === 'video' ? 'https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=80' : item.url;
                
                divWrapper.innerHTML = `
                    <img src="${previewThumb}" class="mini-gallery-img" style="filter: ${item.type === 'video' ? 'hue-rotate(90deg)' : 'none'}" onclick="event.stopPropagation(); triggerMainChange('${cleanedId}', '${item.url}', '${item.type}')">
                    <button class="del-mini-btn" style="display: ${displayState}" onclick="event.stopPropagation(); deleteVariety('${cleanedId}', '${key}')">×</button>
                `;
                container.appendChild(divWrapper);
            });
        } else {
            viewport.innerHTML = `<div style="padding-top:100px; text-align:center; color:#64748b;">No Design Added</div>`;
            if(btn360) btn360.style.display = "none";
        }
    }

    function setMainDisplay(targetDiv, url, type, btn360, cleanedId) {
        if(type === 'video') {
            targetDiv.innerHTML = `<video class="product-media-file" src="${url}" autoplay muted loop playsinline controls></video>`;
            if(btn360) btn360.style.display = "none"; // Hide 360 button for videos
        } else {
            targetDiv.innerHTML = `<div class="product-media-file" id="media-img-${cleanedId}" style="background: url('${url}') center center/cover; transition: background-position 0.05s ease;"></div>`;
            if(btn360) btn360.style.display = "block"; // Show 360 button for photos
        }
        
        targetDiv.parentElement.setAttribute('data-current-url', url);
        targetDiv.parentElement.setAttribute('data-current-type', type);
    }

    function triggerMainChange(cleanedId, url, type) {
        const viewport = document.getElementById("media-viewport-" + cleanedId);
        const btn360 = document.getElementById("btn-360-" + cleanedId);
        
        // Turn off rotation if switching main items
        if(rotationStates[cleanedId]) {
            rotationStates[cleanedId].active = false;
            let mainCard = document.getElementById("card-" + cleanedId);
            if(mainCard) mainCard.style.transform = "rotateY(0deg) rotateX(0deg)";
        }
        
        setMainDisplay(viewport, url, type, btn360, cleanedId);
    }

    // Interactive 360 Engine
    function toggle360Rotation(cleanedId) {
        if(!rotationStates[cleanedId]) {
            rotationStates[cleanedId] = { active: false, startX: 0, currentPos: 50 };
        }
        
        let state = rotationStates[cleanedId];
        state.active = !state.active;
        
        let btn = document.getElementById("btn-360-" + cleanedId);
        let mainCard = document.getElementById("card-" + cleanedId);
        let targetImg = document.getElementById("media-img-" + cleanedId);
        
        if(state.active) {
            btn.innerText = "🛑 Stop 360";
            btn.style.background = "#4a5568";
            mainCard.style.transform = "rotateY(0deg) rotateX(0deg) scale(1.02)";
            alert("Slide/Drag over the picture to rotate it 360° horizontally!");

            // Mouse and Touch Binding for horizontal panning
            const startPan = (e) => {
                if(!state.active) return;
                state.isDragging = true;
                state.startX = e.pageX || e.touches[0].pageX;
            };

            const movePan = (e) => {
                if(!state.active || !state.isDragging) return;
                let currentX = e.pageX || e.touches[0].pageX;
                let diff = currentX - state.startX;
                
                // Shift background-position X axis dynamically
                state.currentPos += diff * 0.4; 
                targetImg.style.backgroundPosition = `${state.currentPos}% center`;
                state.startX = currentX;
            };

            const stopPan = () => { state.isDragging = false; };

            targetImg.addEventListener('mousedown', startPan);
            targetImg.addEventListener('mousemove', movePan);
            window.addEventListener('mouseup', stopPan);

            targetImg.addEventListener('touchstart', startPan, {passive: true});
            targetImg.addEventListener('touchmove', movePan, {passive: true});
            window.addEventListener('touchend', stopPan);
        } else {
            btn.innerText = "🔄 360° Rotate";
            btn.style.background = "rgba(229, 62, 62, 0.9)";
            mainCard.style.transform = "rotateY(0deg) rotateX(0deg)";
            targetImg.style.backgroundPosition = "center center";
        }
    }

    function openMediaZoom(cleanedId) {
        // Prevent zoom preview modal if 360 mode is actively rotating
        if(rotationStates[cleanedId] && rotationStates[cleanedId].active) return;

        const imgContainer = document.getElementById("img-container-" + cleanedId);
        let url = imgContainer.getAttribute('data-current-url');
        let type = imgContainer.getAttribute('data-current-type');
        
        if(!url) return;
        
        const modalContent = document.getElementById("modalContent");
        if(type === 'video') {
            modalContent.innerHTML = `<video src="${url}" controls autoplay loop style="width:100%; max-height:80vh;"></video>`;
        } else {
            modalContent.innerHTML = `<img src="${url}" style="width:100%; max-height:80vh; object-fit:contain;" />`;
        }
        document.getElementById("imageModal").style.display = "flex";
    }

    function closeFullPreview() {
        document.getElementById("imageModal").style.display = "none";
        document.getElementById("modalContent").innerHTML = "";
    }

    function redirectToWhatsApp(productName) {
        let phoneNumber = "919339874507";
        let message = `Hello Prince Premium, mujhe aapke industry showroom se '${productName}' ki variety pasand aayi hai. Mujhe deals aur order booking ki details chahiye.`;
        window.open("https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message), "_blank");
    }

    function uploadVarietyMedia() {
        const cat = document.getElementById("upload-category").value;
        const fileInput = document.getElementById("upload-photo");
        const file = fileInput.files[0];
        const statusDiv = document.getElementById('upload-status');

        if(!file) { alert("Pehle design ki Photo ya Video select karein!"); return; }
        
        let fileType = file.type.startsWith('video') ? 'video' : 'image';
        let cleanedId = cat.replace(/\s+/g, '-').toLowerCase();
        const localUrl = URL.createObjectURL(file);

        if(!db) {
            const tempKey = 'local_' + Date.now();
            if(!localMediaStock[cat]) localMediaStock[cat] = {};
            localMediaStock[cat][tempKey] = { url: localUrl, type: fileType };
            renderGallery(cleanedId, localMediaStock[cat]);
            statusDiv.innerText = "⚡ Local Mode Saved successfully!";
            fileInput.value = "";
            return;
        }

        statusDiv.innerText = "Uploading Media file... ⏳";
        const storagePath = 'varieties/' + cleanedId + '/' + Date.now() + '_' + file.name;
        
        storage.ref(storagePath).put(file).then((snapshot) => {
            snapshot.ref.getDownloadURL().then((url) => {
                db.ref('factory_stock/' + cleanedId).push({
                    url: url,
                    type: fileType,
                    storagePath: storagePath
                }).then(() => {
                    statusDiv.innerText = "🎉 Live Saved successfully on Cloud!";
                    fileInput.value = "";
                });
            });
        }).catch(err => {
            statusDiv.innerText = "Upload failed verification.";
        });
    }

    function deleteVariety(cleanedId, key) {
        if(!isAdminActive) { alert("Security Error!"); return; }
        
        if(confirm("Kya aap ise gallery se hatana chahte hain?")) {
            if(!db) {
                let originalCat = dynamicCategories.find(c => c.replace(/\s+/g, '-').toLowerCase() === cleanedId);
                delete localMediaStock[originalCat][key];
                renderGallery(cleanedId, localMediaStock[originalCat]);
                return;
            }
            db.ref('factory_stock/' + cleanedId + '/' + key).once('value').then(snap => {
                const data = snap.val();
                if(data && data.storagePath) {
                    storage.ref(data.storagePath).delete().catch(()=> {});
                }
                db.ref('factory_stock/' + cleanedId + '/' + key).remove();
            });
        }
    }

    function toggleAdminPanel() {
        var panel = document.getElementById("secure-admin-panel");
        panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
    
    function verifyAdminPIN() {
        var pinInput = document.getElementById("admin-pin").value;
        if(pinInput === "786786") {
            isAdminActive = true;
            document.getElementById("auth-box").style.display = "none";
            document.getElementById("admin-controls").style.display = "block";
            refreshAllViews();
            alert("Welcome Admin! Access Granted.");
        } else { alert("Wrong PIN!"); }
    }

    function logoutAdmin() {
        isAdminActive = false;
        document.getElementById("admin-pin").value = "";
        document.getElementById("auth-box").style.display = "block";
        document.getElementById("admin-controls").style.display = "none";
        document.getElementById("secure-admin-panel").style.display = "none";
        refreshAllViews();
        alert("Logged Out Successfully!");
    }

    function refreshAllViews() {
        dynamicCategories.forEach(cat => {
            let cleanedId = cat.replace(/\s+/g, '-').toLowerCase();
            if(!db) {
                renderGallery(cleanedId, localMediaStock[cat]);
            } else {
                db.ref('factory_stock/' + cleanedId).once('value', (snapshot) => {
                    renderGallery(cleanedId, snapshot.val());
                });
            }
        });
    }
    </script>
